services:
  postgres:
    image: postgres:16-alpine
    container_name: osca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bithack
    # Host 5433 avoids conflict when another Postgres already uses 5432
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d bithack']
      interval: 3s
      timeout: 5s
      retries: 10
